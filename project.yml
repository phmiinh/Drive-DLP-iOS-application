name: BitHub
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 16.6
    PRODUCT_BUNDLE_IDENTIFIER: com.bitcare.bithub.ios
    PRODUCT_NAME: BitHub
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  BitHub:
    type: application
    platform: iOS
    deploymentTarget: "16.6"
    sources:
      - path: App
      - path: Core
      - path: Networking
      - path: Auth
      - path: Persistence
      - path: Domain
      - path: Services
      - path: Features
      - path: SharedUI
      - path: Resources
        buildPhase: resources
    info:
      path: Resources/Info.plist
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
  BitHubTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.6"
    sources:
      - path: Tests
    dependencies:
      - target: BitHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bitcare.bithub.ios.tests
        GENERATE_INFOPLIST_FILE: YES

